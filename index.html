<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Endereço por CEP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 300px;
            text-align: center;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background-color: #45a049;
        }
        #resultado {
            margin-top: 20px;
            text-align: left;
        }
        #resultado p {
            margin: 5px 0;
        }
        .erro {
            color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Buscador de Endereço por CEP</h2>
        <input type="text" id="cep" placeholder="Digite o CEP (ex: 12345-678)" maxlength="9">
        <button onclick="buscarEndereco()">Buscar</button>
        <div id="resultado"></div>
    </div>

    <script>
        function buscarEndereco() {
            const cep = document.getElementById('cep').value.replace(/\D/g, ''); // Remove caracteres não numéricos
            const resultadoDiv = document.getElementById('resultado');

            if (cep.length !== 8) {
                resultadoDiv.innerHTML = '<p class="erro">CEP inválido. Deve conter 8 dígitos.</p>';
                return;
            }

            fetch(`https://viacep.com.br/ws/${cep}/json/`)
                .then(response => response.json())
                .then(data => {
                    if (data.erro) {
                        resultadoDiv.innerHTML = '<p class="erro">CEP não encontrado.</p>';
                    } else {
                        resultadoDiv.innerHTML = `
                            <p><strong>Logradouro:</strong> ${data.logradouro}</p>
                            <p><strong>Bairro:</strong> ${data.bairro}</p>
                            <p><strong>Cidade:</strong> ${data.localidade}</p>
                            <p><strong>Estado:</strong> ${data.uf}</p>
                            <p><strong>CEP:</strong> ${data.cep}</p>
                        `;
                    }
                })
                .catch(error => {
                    resultadoDiv.innerHTML = '<p class="erro">Erro ao buscar o CEP. Tente novamente.</p>';
                    console.error('Erro:', error);
                });
        }
    </script>
</body>
</html>
